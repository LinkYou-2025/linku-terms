<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>링큐 약관</title>

  <!-- JS 리다이렉트 -->
  <script>
    // 루트로 들어왔는데 슬래시가 없으면 슬래시 붙여서 강제 정규화
    if (location.pathname === "") location.replace("/");
    // 약관 메인으로 이동
    location.replace("terms.html");
  </script>

  <!-- 메타 리다이렉트 -->
  <meta http-equiv="refresh" content="0; url=terms.html" />
</head>
<body>
  <p>이용약관으로 이동합니다. 자동으로 이동하지 않으면 <a href="terms.html">여기</a>를 눌러주세요.</p>
</body>
</html>
